name: Sync Fork with Upstream

on:
  schedule:
    # Run every day at 00:00 UTC (8 AM Nairobi time)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main
      
      - name: Set up Git
        run: |
          git config user.name "Aegis Bot"
          git config user.email "bot@aegis.dev"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/elie222/inbox-zero.git || true
          git fetch upstream
      
      - name: Check for updates
        id: check
        run: |
          BEHIND_COUNT=$(git rev-list --count HEAD..upstream/main)
          echo "behind_count=$BEHIND_COUNT" >> $GITHUB_OUTPUT
          
          if [ $BEHIND_COUNT -eq 0 ]; then
            echo "status=up-to-date" >> $GITHUB_OUTPUT
            echo "✅ Already up to date with upstream"
          else
            echo "status=needs-sync" >> $GITHUB_OUTPUT
            echo "⚠️  Found $BEHIND_COUNT new commits from upstream"
            echo "## New Commits from Upstream" >> $GITHUB_STEP_SUMMARY
            git log --oneline HEAD..upstream/main >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Sync main branch
        if: steps.check.outputs.status == 'needs-sync'
        run: |
          git checkout main
          git merge upstream/main --no-edit
      
      - name: Push changes
        if: steps.check.outputs.status == 'needs-sync'
        run: |
          git push origin main
          echo "✅ Successfully synced with upstream!" >> $GITHUB_STEP_SUMMARY
          echo "Synced ${{ steps.check.outputs.behind_count }} commits" >> $GITHUB_STEP_SUMMARY
      
      - name: Create issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream Sync Failed - Manual Resolution Required',
              body: `## Sync Conflict Detected
              
              The automatic sync with upstream failed. This usually means there are merge conflicts that need manual resolution.
              
              **Upstream**: https://github.com/elie222/inbox-zero
              **Fork**: https://github.com/${context.repo.owner}/${context.repo.repo}
              
              ### Resolution Steps:
              1. Clone the repo locally
              2. Run: \`git fetch upstream\`
              3. Run: \`git merge upstream/main\`
              4. Resolve conflicts in VS Code
              5. Run: \`git add .\`
              6. Run: \`git commit -m "chore: resolve merge conflicts from upstream"\`
              7. Run: \`git push origin main\`
              
              ### Workflow Run:
              ${context.payload.repository.html_url}/actions/runs/${context.runId}
              
              Close this issue after resolving the conflicts.`,
              labels: ['sync-conflict', 'needs-attention']
            });
